<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificar Relaciones - Oracle</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; max-height: 600px; overflow: auto; font-size: 12px; }
        button { padding: 0.5rem 1rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Verificar Relaciones Familiares</h2>
        <p style="color:#666;font-size:14px;">Muestra las relaciones entre titulares, cónyuges e hijos.</p>
        <button onclick="verificar()">Cargar relaciones</button>
    </div>
    <div class="card">
        <h3>Resultados</h3>
        <pre id="result"></pre>
    </div>
    <script>
        const API_URL = window.location.protocol + '//' + window.location.hostname + ':3046';
        async function api(table, params) {
            const qs = Object.entries(params).map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
            const r = await fetch(`${API_URL}/api/rest/${table}?${qs}`);
            return r.json();
        }

        async function verificar() {
            const result = document.getElementById('result');
            result.textContent = 'Cargando...';
            let output = '';

            // Relaciones cónyuge
            const { data: relaciones } = await api('conyuge_relacion', { select: 'id,titular1_id,titular2_id' });
            output += `=== CONYUGE_RELACION: ${relaciones ? relaciones.length : 0} registros ===\n\n`;
            if (relaciones) {
                for (let i = 0; i < Math.min(relaciones.length, 30); i++) {
                    const r = relaciones[i];
                    const { data: t1 } = await api('titulares', { select: 'id,ci,nombre,apellido', id: 'eq.' + r.titular1_id });
                    const { data: t2 } = await api('titulares', { select: 'id,ci,nombre,apellido', id: 'eq.' + r.titular2_id });
                    const n1 = t1 && t1[0] ? `${t1[0].nombre} ${t1[0].apellido} (${t1[0].ci})` : '???';
                    const n2 = t2 && t2[0] ? `${t2[0].nombre} ${t2[0].apellido} (${t2[0].ci})` : '???';
                    output += `#${r.id}: ${n1} <-> ${n2}\n`;
                }
                if (relaciones.length > 30) output += `... y ${relaciones.length - 30} más\n`;
            }

            // Hijo_titular relations
            const { data: ht } = await api('hijo_titular', { select: 'id,titular_id,hijo_id', limit: '50' });
            output += `\n=== HIJO_TITULAR: ${ht ? ht.length : 0}+ registros ===\n\n`;
            if (ht) {
                for (let i = 0; i < Math.min(ht.length, 20); i++) {
                    const r = ht[i];
                    const { data: t } = await api('titulares', { select: 'id,nombre,apellido', id: 'eq.' + r.titular_id });
                    const { data: h } = await api('hijos', { select: 'id,nombre,apellido', id: 'eq.' + r.hijo_id });
                    const tn = t && t[0] ? `${t[0].nombre} ${t[0].apellido}` : '???';
                    const hn = h && h[0] ? `${h[0].nombre} ${h[0].apellido}` : '???';
                    output += `#${r.id}: Titular ${tn} -> Hijo ${hn}\n`;
                }
            }

            // Stats
            const { data: titulares } = await api('titulares', { select: 'id', limit: '1' });
            const { data: conyuges } = await api('conyuges', { select: 'id', limit: '1' });
            const { data: hijos } = await api('hijos', { select: 'id', limit: '1' });
            const r1 = await fetch(`${API_URL}/api/rest/titulares?select=id&head=true&count=exact`);
            const j1 = await r1.json();
            const r2 = await fetch(`${API_URL}/api/rest/conyuges?select=id&head=true&count=exact`);
            const j2 = await r2.json();
            const r3 = await fetch(`${API_URL}/api/rest/hijos?select=id&head=true&count=exact`);
            const j3 = await r3.json();

            output += `\n=== TOTALES ===\n`;
            output += `Titulares: ${j1.count || 0}\n`;
            output += `Cónyuges: ${j2.count || 0}\n`;
            output += `Hijos: ${j3.count || 0}\n`;

            result.textContent = output;
        }
        verificar();
    </script>
</body>
</html>
