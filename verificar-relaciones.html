<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificar Relaciones</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        button { padding: 0.5rem 1rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; max-height: 400px; overflow: auto; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Verificar Relaciones</h2>
        <button onclick="verificar()">Verificar todas las relaciones</button>
    </div>
    <div class="card">
        <h3>Resultados</h3>
        <pre id="result"></pre>
    </div>

    <script>
        const SUPABASE_URL = 'https://mrshoeaovukolclsvypy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yc2hvZWFvdnVrb2xjbHN2eXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3ODAwNDAsImV4cCI6MjA5NzM1NjA0MH0.2mTVIaRy3KBRrcIHSiL6FC6SBz3f_hiicFSjTIkkThI';
        const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function verificar() {
            const resultEl = document.getElementById('result');
            resultEl.textContent = 'Buscando...';
            
            // Buscar todas las relaciones
            const { data: relaciones, error } = await supa.from('conyuge_relacion').select('id, titular1_id, titular2_id');
            
            if (error) {
                resultEl.textContent = 'Error: ' + error.message;
                return;
            }
            
            let output = `Total de relaciones: ${relaciones.length}\n\n`;
            
            // Buscar IDs de los titulares 2365691 y 2370824
            const { data: t1 } = await supa.from('titulares').select('id').eq('ci', '2365691').maybeSingle();
            const { data: t2 } = await supa.from('titulares').select('id').eq('ci', '2370824').maybeSingle();
            
            output += `ID de 2365691: ${t1 ? t1.id : 'NO ENCONTRADO'}\n`;
            output += `ID de 2370824: ${t2 ? t2.id : 'NO ENCONTRADO'}\n\n`;
            
            // Buscar relaciones específicas
            const rel1 = relaciones.find(r => r.titular1_id === t1?.id && r.titular2_id === t2?.id);
            const rel2 = relaciones.find(r => r.titular1_id === t2?.id && r.titular2_id === t1?.id);
            
            output += `Relación 2365691->2370824: ${rel1 ? 'ENCONTRADA' : 'NO ENCONTRADA'}\n`;
            output += `Relación 2370824->2365691: ${rel2 ? 'ENCONTRADA' : 'NO ENCONTRADA'}\n\n`;
            
            // Mostrar las primeras 10 relaciones
            output += '=== Primeras 10 relaciones ===\n';
            relaciones.slice(0, 10).forEach(r => {
                output += `titular1_id: ${r.titular1_id}, titular2_id: ${r.titular2_id}\n`;
            });
            
            resultEl.textContent = output;
        }
    </script>
</body>
</html>
