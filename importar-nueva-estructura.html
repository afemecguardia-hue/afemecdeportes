<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Importar CSV - Oracle</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; max-height: 400px; overflow: auto; font-size: 12px; }
        input, select { padding: 0.5rem; margin-right: 0.5rem; }
        button { padding: 0.5rem 1rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .ok { color: #16a34a; }
        .err { color: #dc2626; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Importar CSV a Oracle</h2>
        <p style="color:#666;font-size:14px;">Seleccioná un archivo CSV y la tabla destino para importar.</p>
        <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
            <input type="file" id="csvFile" accept=".csv">
            <select id="targetTable">
                <option value="titulares">Titulares</option>
                <option value="conyuges">Cónyuges</option>
                <option value="hijos">Hijos</option>
                <option value="atletas">Atletas</option>
                <option value="equipos">Equipos</option>
            </select>
            <button onclick="importar()" id="btnImport">Importar</button>
        </div>
        <div style="margin-top:0.5rem;">
            <label><input type="checkbox" id="upsertMode" checked> Upsert (actualizar si existe)</label>
            <label style="margin-left:1rem;"><input type="checkbox" id="skipFirstRow" checked> Saltar primera fila (encabezados)</label>
        </div>
    </div>
    <div class="card">
        <h3>Resultado</h3>
        <pre id="result">Listo para importar.</pre>
    </div>
    <script>
        const API_URL = window.location.protocol + '//' + window.location.hostname + ':3046';

        async function importar() {
            const file = document.getElementById('csvFile').files[0];
            if (!file) return alert('Seleccioná un archivo CSV');

            const btn = document.getElementById('btnImport');
            btn.disabled = true;
            btn.textContent = 'Importando...';
            const result = document.getElementById('result');
            result.textContent = 'Leyendo CSV...\n';

            const text = await file.text();
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            if (lines.length < 2) { result.textContent += 'El CSV debe tener al menos 2 filas'; btn.disabled = false; btn.textContent = 'Importar'; return; }

            const skipHeader = document.getElementById('skipFirstRow').checked;
            const dataLines = skipHeader ? lines.slice(1) : lines;
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/[^a-z0-9_]/g, ''));
            const table = document.getElementById('targetTable').value;
            const upsert = document.getElementById('upsertMode').checked;

            result.textContent += `Tabla: ${table}\n`;
            result.textContent += `Columnas: ${headers.join(', ')}\n`;
            result.textContent += `Filas: ${dataLines.length}\n\n`;

            let ok = 0, err = 0;
            for (let i = 0; i < dataLines.length; i++) {
                const vals = dataLines[i].split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                const row = {};
                headers.forEach((h, idx) => { if (vals[idx] !== undefined && vals[idx] !== '') row[h] = vals[idx]; });
                if (Object.keys(row).length === 0) { err++; continue; }

                try {
                    const url = upsert ? `${API_URL}/api/rest/${table}/upsert` : `${API_URL}/api/rest/${table}`;
                    const body = upsert ? { rows: [row], onConflict: 'CI' } : row;
                    const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                    const json = await resp.json();
                    if (json.error) { err++; result.textContent += `[ERR] Fila ${i+1}: ${json.error.message}\n`; }
                    else { ok++; }
                } catch (e) {
                    err++;
                    result.textContent += `[ERR] Fila ${i+1}: ${e.message}\n`;
                }

                if ((i + 1) % 50 === 0) {
                    result.textContent += `Procesadas ${i+1}/${dataLines.length}...\n`;
                }
            }

            result.textContent += `\n--- FIN ---\nOK: ${ok} | ERRORES: ${err}\n`;
            btn.disabled = false;
            btn.textContent = 'Importar';
        }
    </script>
</body>
</html>
