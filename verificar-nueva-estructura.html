<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificar Nueva Estructura - Oracle</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; max-height: 500px; overflow: auto; font-size: 12px; }
        input { padding: 0.5rem; margin-right: 0.5rem; width: 200px; }
        button { padding: 0.5rem 1rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1rem; }
        .stat { background: #f0fdf4; border-radius: 8px; padding: 1rem; text-align: center; }
        .stat .num { font-size: 2rem; font-weight: bold; color: #16a34a; }
        .stat .label { font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Verificar Nueva Estructura (Oracle)</h2>
        <p style="color:#666;font-size:14px;">Muestra estadísticas de la base de datos Oracle.</p>
        <button onclick="verificar()">Actualizar</button>
    </div>
    <div id="stats" class="stats"></div>
    <div class="card">
        <h3>Detalle</h3>
        <pre id="result">Cargando...</pre>
    </div>
    <script>
        const API_URL = window.location.protocol + '//' + window.location.hostname + ':3046';

        async function apiCount(table) {
            const r = await fetch(`${API_URL}/api/rest/${table}?select=id&head=true&count=exact`);
            const j = await r.json();
            return j.count || 0;
        }

        async function verificar() {
            const result = document.getElementById('result');
            const statsDiv = document.getElementById('stats');
            result.textContent = 'Cargando...';

            const [titulares, conyuges, hijos, atletas, equipos, categorias, relaciones, usuarioCount] = await Promise.all([
                apiCount('titulares'), apiCount('conyuges'), apiCount('hijos'),
                apiCount('atletas'), apiCount('equipos'), apiCount('categorias_config'),
                apiCount('conyuge_relacion'), apiCount('users')
            ]);

            statsDiv.innerHTML = `
                <div class="stat"><div class="num">${titulares}</div><div class="label">Titulares</div></div>
                <div class="stat"><div class="num">${conyuges}</div><div class="label">Cónyuges</div></div>
                <div class="stat"><div class="num">${hijos}</div><div class="label">Hijos</div></div>
                <div class="stat"><div class="num">${atletas}</div><div class="label">Atletas</div></div>
                <div class="stat"><div class="num">${equipos}</div><div class="label">Equipos</div></div>
                <div class="stat"><div class="num">${categorias}</div><div class="label">Categorías</div></div>
                <div class="stat"><div class="num">${relaciones}</div><div class="label">Relac. Cónyuge</div></div>
                <div class="stat"><div class="num">${usuarioCount}</div><div class="label">Usuarios</div></div>
            `;

            result.textContent = 'Datos cargados correctamente.';
        }
        verificar();
    </script>
</body>
</html>
