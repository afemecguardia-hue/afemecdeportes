<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificar CI - Oracle</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; max-height: 600px; overflow: auto; font-size: 12px; }
        input { padding: 0.5rem; margin-right: 0.5rem; width: 200px; }
        button { padding: 0.5rem 1rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Verificar CI en Oracle</h2>
        <input type="text" id="ciInput" placeholder="Ingresa CI" value="1045174">
        <button onclick="verificar()">Verificar</button>
    </div>
    <div class="card">
        <h3>Resultados</h3>
        <pre id="result"></pre>
    </div>

    <script>
        const API_URL = window.location.protocol + '//' + window.location.hostname + ':3046';
        async function api(table, params) {
            const qs = Object.entries(params).map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
            const r = await fetch(`${API_URL}/api/rest/${table}?${qs}`);
            return r.json();
        }

        async function verificar() {
            const ci = document.getElementById('ciInput').value.trim();
            const result = document.getElementById('result');
            result.textContent = 'Buscando...';
            let output = '';

            // Buscar en titulares
            const { data: titulares } = await api('titulares', { select: 'id,ci,nombre,apellido,fecha_nacimiento,habilitado', ci: 'eq.' + ci });
            if (titulares && titulares.length) {
                output += `=== TITULARES (${titulares.length}) ===\n\n`;
                titulares.forEach(t => {
                    output += `ID: ${t.id} | CI: ${t.ci} | ${t.nombre} ${t.apellido} | Nac: ${t.fecha_nacimiento || 'N/A'} | ${t.habilitado ? 'Habilitado' : 'Deshabilitado'}\n`;
                });
                output += '\n';
            }

            // Buscar en cónyuges
            const { data: conyuges } = await api('conyuges', { select: 'id,ci,nombre,apellido,fecha_nacimiento,titular_id', ci: 'eq.' + ci });
            if (conyuges && conyuges.length) {
                output += `=== CONYUGES (${conyuges.length}) ===\n\n`;
                for (const c of conyuges) {
                    const { data: tit } = c.titular_id ? await api('titulares', { select: 'id,ci,nombre,apellido', id: 'eq.' + c.titular_id }) : { data: null };
                    output += `ID: ${c.id} | CI: ${c.ci} | ${c.nombre} ${c.apellido} | Nac: ${c.fecha_nacimiento || 'N/A'}`;
                    if (tit && tit[0]) output += ` | Titular: ${tit[0].nombre} ${tit[0].apellido} (CI: ${tit[0].ci})`;
                    output += '\n';
                }
                output += '\n';
            }

            // Buscar en hijos
            const { data: hijos } = await api('hijos', { select: 'id,ci,nombre,apellido,fecha_nacimiento', ci: 'eq.' + ci });
            if (hijos && hijos.length) {
                output += `=== HIJOS (${hijos.length}) ===\n\n`;
                for (const h of hijos) {
                    const { data: padres } = await api('hijo_titular', { select: 'titular:titulares(id,ci,nombre,apellido)', hijo_id: 'eq.' + h.id });
                    output += `ID: ${h.id} | CI: ${h.ci} | ${h.nombre} ${h.apellido} | Nac: ${h.fecha_nacimiento || 'N/A'}`;
                    if (padres && padres.length) {
                        const padresStr = padres.map(p => `${p.titular?.nombre || ''} ${p.titular?.apellido || ''} (CI: ${p.titular?.ci || 'N/A'})`).join(', ');
                        output += ` | Titulares: ${padresStr}`;
                    }
                    output += '\n';
                }
                output += '\n';
            }

            if (!titulares && !conyuges && !hijos) {
                output = 'No se encontraron registros con ese CI';
            }

            result.textContent = output;
        }
        verificar();
    </script>
</body>
</html>
