<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Importar CSV - AFEMEC</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; max-height: 400px; overflow: auto; font-size: 12px; }
        .ok { color: #16a34a; }
        .err { color: #dc2626; }
        button { padding: 0.5rem 1rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { opacity: 0.5; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin: 1rem 0; }
        .stat { text-align: center; padding: 1rem; background: #f0fdf4; border-radius: 8px; }
        .stat span { display: block; font-size: 1.5rem; font-weight: bold; color: #16a34a; }
        input[type="file"] { margin: 1rem 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Importar CSV de Socios a Oracle</h2>
        <p>Selecciona el archivo <strong>SOCIOS ACTIVOS UNIFICADOS 17.06 CON FECHAS.csv</strong></p>
        <input type="file" id="csvFile" accept=".csv">
        <button id="btnImport" onclick="importar()">Importar</button>
        <div id="status"></div>
        <div class="stats" id="stats" style="display:none">
            <div class="stat"><span id="s-titulares">0</span>Titulares</div>
            <div class="stat"><span id="s-conyuges">0</span>Cónyuges</div>
            <div class="stat"><span id="s-hijos">0</span>Hijos</div>
            <div class="stat"><span id="s-padres">0</span>Padres</div>
        </div>
    </div>
    <div class="card">
        <h3>Log</h3>
        <pre id="log"></pre>
    </div>

    <script>
        const API_URL = window.location.protocol + '//' + window.location.hostname + ':3046';
        const logEl = document.getElementById('log');
        function addLog(msg) { logEl.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`; logEl.scrollTop = logEl.scrollHeight; }

        async function apiGet(table, params) {
            const qs = Object.entries(params).map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
            const resp = await fetch(`${API_URL}/api/rest/${table}?${qs}`);
            return resp.json();
        }

        async function apiPost(table, data) {
            const resp = await fetch(`${API_URL}/api/rest/${table}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
            });
            return resp.json();
        }

        async function apiPatch(table, filters, data) {
            const qs = Object.entries(filters).map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
            const resp = await fetch(`${API_URL}/api/rest/${table}?${qs}`, {
                method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
            });
            return resp.json();
        }

        async function apiDelete(table, filters) {
            const qs = Object.entries(filters).map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
            const resp = await fetch(`${API_URL}/api/rest/${table}?${qs}`, { method: 'DELETE' });
            return resp.json();
        }

        async function apiUpsert(table, rows, onConflict) {
            const resp = await fetch(`${API_URL}/api/rest/${table}/upsert`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rows, onConflict: onConflict || 'CI' })
            });
            return resp.json();
        }

        async function importar() {
            const fileInput = document.getElementById('csvFile');
            const btn = document.getElementById('btnImport');
            if (!fileInput.files.length) { addLog('Seleccioná un archivo CSV primero'); return; }
            btn.disabled = true;

            const text = await fileInput.files[0].text();
            const lines = text.split('\n').filter(l => l.trim());
            const dataLines = lines.slice(2);
            addLog(`Filas de datos: ${dataLines.length}`);

            // ---- PARSEAR ----
            const titulares = new Map();
            const conyuges = [], hijos = [];
            let conyugesConCI = 0, hijosConCI = 0;

            for (const line of dataLines) {
                const r = parseCSVLine(line);
                if (r.length < 19) continue;
                const ci = cleanNum(r[0]), nom = r[1].trim(), ape = r[2].trim();
                if (!ci && !nom) continue;

                const fechaTitular = r.length > 18 ? r[18].trim() : '';
                const fechaConyuge = r.length > 19 ? r[19].trim() : '';
                const fechaHijo = r.length > 20 ? r[20].trim() : '';

                const limpiarFecha = (f) => {
                    if (!f || f === '-   -' || f === '-' || f === '0' || f === '') return null;
                    if (f.match(/^\d{4}-\d{2}-\d{2}$/)) return f;
                    return null;
                };

                const fechaTitularLimpia = limpiarFecha(fechaTitular);
                if (!titulares.has(ci)) {
                    titulares.set(ci, { ci, nombre: nom, apellido: ape, fecha_nacimiento: fechaTitularLimpia });
                } else {
                    const existente = titulares.get(ci);
                    if (fechaTitularLimpia) {
                        existente.fecha_nacimiento = fechaTitularLimpia;
                        titulares.set(ci, existente);
                    }
                }
                const cNom = r[5].trim();
                const cCi = cleanNum(r[4]);
                const fechaConyugeLimpia = limpiarFecha(fechaConyuge);
                if (cNom && cNom !== '0') {
                    conyuges.push({ ci_titular: ci, ci: cCi, nombre: cNom, apellido: r[6].trim() || '', fecha_nacimiento: fechaConyugeLimpia });
                    if (cCi && cCi !== '0' && cCi !== '') conyugesConCI++;
                }
                const hNom = r[17].trim();
                const hCi = cleanNum(r[16]);
                if (hNom && hNom !== '0') {
                    hijos.push({ ci_titular: ci, ci: hCi, nombre: hNom, apellido: r[18].trim() || '', fecha_nacimiento: fechaTitularLimpia });
                    if (hCi && hCi !== '0' && hCi !== '') hijosConCI++;
                }
            }

            addLog(`Parseo: ${titulares.size} titulares, ${conyuges.length} cónyuges (${conyugesConCI} con CI), ${hijos.length} hijos (${hijosConCI} con CI)`);

            // ---- UPSERT TITULARES ----
            addLog('Upsert titulares...');
            const arrT = Array.from(titulares.values());
            const ciToId = new Map();
            const B = 200;
            for (let i = 0; i < arrT.length; i += B) {
                const batch = arrT.slice(i, i + B).map(t => ({
                    ci: t.ci,
                    nombre: t.nombre,
                    apellido: t.apellido,
                    tipo: 'titular',
                    fecha_nacimiento: t.fecha_nacimiento || null
                }));
                const { data, error } = await apiUpsert('titulares', batch, 'CI');
                if (error) { addLog(`Error lote ${i}: ${error.message}`); continue; }
                if (data) {
                    for (const row of data) {
                        if (row.ci) ciToId.set(row.ci, row.id);
                    }
                }
                addLog(`  Titulares: ${Math.min(i + B, arrT.length)}/${arrT.length}`);
            }

            // ---- UPSERT FAMILIARES ----
            async function upsertFamiliares(lista, tipo) {
                if (!lista.length) return;

                const conCi = [];
                const sinCi = [];

                for (const item of lista) {
                    const tid = ciToId.get(item.ci_titular);
                    if (tid) {
                        if (item.ci && item.ci !== '0' && item.ci !== '' && item.ci !== 0) {
                            conCi.push({ ...item, familia_id: tid });
                        } else {
                            sinCi.push({ ...item, familia_id: tid });
                        }
                    }
                }

                if (conCi.length > 0) {
                    const uniqueMap = new Map();
                    for (const item of conCi) {
                        if (!uniqueMap.has(item.ci)) {
                            uniqueMap.set(item.ci, item);
                        }
                    }
                    const uniqueConCi = Array.from(uniqueMap.values());

                    for (let i = 0; i < uniqueConCi.length; i += B) {
                        const batch = uniqueConCi.slice(i, i + B).map(item => ({
                            ci: item.ci,
                            nombre: item.nombre,
                            apellido: item.apellido,
                            tipo: tipo,
                            familia_id: item.familia_id,
                            fecha_nacimiento: item.fecha_nacimiento || null
                        }));

                        const { error } = await apiUpsert('titulares', batch, 'CI');
                        if (error) addLog(`Error upsert ${tipo}: ${error.message}`);
                    }
                }

                if (sinCi.length > 0) {
                    const familiaIds = [...new Set(sinCi.map(b => b.familia_id))];
                    for (const fid of familiaIds) {
                        await apiDelete('titulares', { 'familia_id': 'eq.' + fid, 'tipo': 'eq.' + tipo });
                    }

                    for (let i = 0; i < sinCi.length; i += B) {
                        const batch = sinCi.slice(i, i + B).map(item => ({
                            nombre: item.nombre,
                            apellido: item.apellido,
                            tipo: tipo,
                            familia_id: item.familia_id,
                            fecha_nacimiento: item.fecha_nacimiento || null
                        }));

                        const { error } = await apiPost('titulares', batch);
                        if (error) addLog(`Error insertar ${tipo} sin ci: ${error.message}`);
                    }
                }
            }

            addLog('Upsert cónyuges...');
            await upsertFamiliares(conyuges, 'conyuge');
            addLog(`  ${conyuges.length} cónyuges`);

            addLog('Upsert hijos...');
            await upsertFamiliares(hijos, 'hijo');
            addLog(`  ${hijos.length} hijos`);

            addLog('--- IMPORTACIÓN COMPLETADA ---');
            addLog(`Estadísticas finales: ${conyugesConCI} cónyuges con CI, ${hijosConCI} hijos con CI`);
            document.getElementById('stats').style.display = 'grid';
            document.getElementById('s-titulares').textContent = titulares.size;
            document.getElementById('s-conyuges').textContent = `${conyuges.length} (${conyugesConCI} con CI)`;
            document.getElementById('s-hijos').textContent = `${hijos.length} (${hijosConCI} con CI)`;
            document.getElementById('s-padres').textContent = '0';
            btn.disabled = false;
        }

        function parseCSVLine(line) {
            const result = []; let cur = ''; let inQ = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') inQ = !inQ;
                else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
                else cur += ch;
            }
            result.push(cur);
            return result;
        }

        function cleanNum(val) {
            val = val.trim();
            if (val === '0' || val === '') return '';
            return val.replace(/[.,\s]/g, '').trim();
        }
    </script>
</body>
</html>
