<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Importar CSV - AFEMEC</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; max-height: 400px; overflow: auto; font-size: 12px; }
        .ok { color: #16a34a; }
        .err { color: #dc2626; }
        button { padding: 0.5rem 1rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { opacity: 0.5; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin: 1rem 0; }
        .stat { text-align: center; padding: 1rem; background: #f0fdf4; border-radius: 8px; }
        .stat span { display: block; font-size: 1.5rem; font-weight: bold; color: #16a34a; }
        input[type="file"] { margin: 1rem 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Importar CSV de Socios a Supabase</h2>
        <p>Selecciona el archivo <strong>SOCIOS ACTIVOS UNIFICADOS 17.06.csv</strong></p>
        <input type="file" id="csvFile" accept=".csv">
        <button id="btnImport" onclick="importar()">Importar</button>
        <div id="status"></div>
        <div class="stats" id="stats" style="display:none">
            <div class="stat"><span id="s-titulares">0</span>Titulares</div>
            <div class="stat"><span id="s-conyuges">0</span>Cónyuges</div>
            <div class="stat"><span id="s-hijos">0</span>Hijos</div>
            <div class="stat"><span id="s-padres">0</span>Padres</div>
        </div>
    </div>
    <div class="card">
        <h3>Log</h3>
        <pre id="log"></pre>
    </div>

    <script>
        const SUPABASE_URL = 'https://mrshoeaovukolclsvypy.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1yc2hvZWFvdnVrb2xjbHN2eXB5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3ODAwNDAsImV4cCI6MjA5NzM1NjA0MH0.2mTVIaRy3KBRrcIHSiL6FC6SBz3f_hiicFSjTIkkThI';
        const supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const log = document.getElementById('log');
        function addLog(msg) { log.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`; log.scrollTop = log.scrollHeight; }

        async function importar() {
            const fileInput = document.getElementById('csvFile');
            const btn = document.getElementById('btnImport');
            if (!fileInput.files.length) { addLog('Seleccioná un archivo CSV primero'); return; }
            btn.disabled = true;

            const text = await fileInput.files[0].text();
            const lines = text.split('\n').filter(l => l.trim());
            const dataLines = lines.slice(2);
            addLog(`Filas de datos: ${dataLines.length}`);

            // ---- PARSEAR ----
            const titulares = new Map();
            const conyuges = [], hijos = [], padres = [];

            for (const line of dataLines) {
                const r = parseCSVLine(line);
                if (r.length < 19) continue;
                const ci = cleanNum(r[0]), nom = r[1].trim(), ape = r[2].trim();
                if (!ci && !nom) continue;
                if (!titulares.has(ci)) titulares.set(ci, { ci, nombre: nom, apellido: ape });
                const cNom = r[5].trim();
                if (cNom && cNom !== '0') conyuges.push({ ci_titular: ci, nombre: cNom, apellido: r[6].trim() || '' });
                const hNom = r[17].trim();
                if (hNom && hNom !== '0') hijos.push({ ci_titular: ci, ci: cleanNum(r[16]), nombre: hNom, apellido: r[18].trim() || '' });
                const pNom = r[8].trim();
                if (pNom && pNom !== '0') padres.push({ ci_titular: ci, nombre: pNom, apellido: r[9].trim() || '', ci: cleanNum(r[10]), tipo: 'padre' });
                const mNom = r[12].trim();
                if (mNom && mNom !== '0') padres.push({ ci_titular: ci, nombre: mNom, apellido: r[13].trim() || '', ci: cleanNum(r[14]), tipo: 'madre' });
            }

            addLog(`Parseo: ${titulares.size} titulares, ${conyuges.length} cónyuges, ${hijos.length} hijos, ${padres.length} padres`);

            // ---- INSERTAR TITULARES ----
            addLog('Insertando titulares...');
            const arrT = Array.from(titulares.values());
            const ciToId = new Map();
            const B = 200;
            for (let i = 0; i < arrT.length; i += B) {
                const batch = arrT.slice(i, i + B).map(t => ({ ci: t.ci, nombre: t.nombre, apellido: t.apellido, tipo: 'titular' }));
                const { data, error } = await supa.from('socios').insert(batch).select('id, ci');
                if (error) { addLog(`Error lote ${i}: ${error.message}`); continue; }
                if (data) data.forEach(d => ciToId.set(d.ci, d.id));
                addLog(`  Titulares: ${Math.min(i + B, arrT.length)}/${arrT.length}`);
            }

            // ---- FAMILIA_ID = id para titulares ----
            addLog('Asignando familia_id...');
            for (const [ci, id] of ciToId) {
                await supa.from('socios').update({ familia_id: id }).eq('id', id);
            }
            addLog(`  ${ciToId.size} titulares actualizados`);

            // ---- INSERTAR FAMILIARES (usando mapa ci->id, sin SELECTs) ----
            async function insertarLote(lista, tabla, mapper) {
                if (!lista.length) return;
                for (let i = 0; i < lista.length; i += B) {
                    const batch = [];
                    for (const item of lista.slice(i, i + B)) {
                        const tid = ciToId.get(item.ci_titular);
                        if (tid) batch.push(mapper(item, tid));
                    }
                    if (batch.length) {
                        const { error } = await supa.from(tabla).insert(batch);
                        if (error) addLog(`Error ${tabla}: ${error.message}`);
                    }
                }
            }

            addLog('Insertando cónyuges...');
            await insertarLote(conyuges, 'socios', (c, tid) => ({ nombre: c.nombre, apellido: c.apellido, tipo: 'conyuge', familia_id: tid }));
            addLog(`  ${conyuges.length} cónyuges`);

            addLog('Insertando hijos...');
            await insertarLote(hijos, 'socios', (h, tid) => ({ ci: h.ci, nombre: h.nombre, apellido: h.apellido, tipo: 'hijo', familia_id: tid }));
            addLog(`  ${hijos.length} hijos`);

            addLog('Insertando padres...');
            await insertarLote(padres, 'padres_titular', (p, tid) => ({ titular_id: tid, nombre: p.nombre, apellido: p.apellido, ci: p.ci, tipo: p.tipo }));
            addLog(`  ${padres.length} padres`);

            addLog('--- IMPORTACIÓN COMPLETADA ---');
            document.getElementById('stats').style.display = 'grid';
            document.getElementById('s-titulares').textContent = titulares.size;
            document.getElementById('s-conyuges').textContent = conyuges.length;
            document.getElementById('s-hijos').textContent = hijos.length;
            document.getElementById('s-padres').textContent = padres.length;
            btn.disabled = false;
        }

        function parseCSVLine(line) {
            const result = []; let cur = ''; let inQ = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') inQ = !inQ;
                else if (ch === ',' && !inQ) { result.push(cur); cur = ''; }
                else cur += ch;
            }
            result.push(cur);
            return result;
        }

        function cleanNum(val) {
            val = val.trim();
            if (val === '0' || val === '') return '';
            return val.replace(/[.,\s]/g, '').trim();
        }
    </script>
</body>
</html>
