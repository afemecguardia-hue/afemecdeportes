<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparar CSV con Oracle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 0 auto; padding: 1rem; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; }
        pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; max-height: 600px; overflow: auto; font-size: 11px; }
        input[type="file"] { margin: 0.5rem 0; }
        button { padding: 0.5rem 1rem; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap: 0.5rem; margin: 1rem 0; }
        .stat { background: #f0fdf4; border-radius: 6px; padding: 0.75rem; text-align: center; }
        .stat .num { font-size: 1.5rem; font-weight: bold; color: #16a34a; }
        .stat .label { font-size: 0.8rem; color: #666; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 4px 8px; text-align: left; }
        th { background: #f9fafb; position: sticky; top: 0; }
        .diff { background: #fef2f2; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Comparar CSV con Oracle</h2>
        <p style="color:#666;font-size:14px;">Cargá un CSV y compará los datos con los registros en Oracle.</p>
        <input type="file" id="csvFile" accept=".csv">
        <select id="tableSelect">
            <option value="titulares">Titulares</option>
            <option value="conyuges">Cónyuges</option>
            <option value="hijos">Hijos</option>
        </select>
        <select id="matchColumn">
            <option value="ci">Por CI</option>
            <option value="id">Por ID</option>
        </select>
        <button onclick="comparar()">Comparar</button>
    </div>
    <div id="stats" class="stats"></div>
    <div class="card">
        <h3>Detalle</h3>
        <div style="overflow-x:auto;">
            <table id="resultsTable">
                <thead><tr><th>#</th><th>CSV</th><th>Oracle</th><th>Diferencias</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <script>
        const API_URL = window.location.protocol + '//' + window.location.hostname + ':3046';
        async function api(table, params) {
            const qs = Object.entries(params).map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`).join('&');
            const r = await fetch(`${API_URL}/api/rest/${table}?${qs}`);
            return r.json();
        }

        async function comparar() {
            const file = document.getElementById('csvFile').files[0];
            if (!file) return alert('Seleccioná un archivo CSV');
            const table = document.getElementById('tableSelect').value;
            const matchCol = document.getElementById('matchColumn').value;

            const text = await file.text();
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/^"|"$/g, ''));
            const dataLines = lines.slice(1);

            // Cargar todos los registros de Oracle
            const { data: oracleRows } = await api(table, { select: '*', limit: '10000' });

            const statsDiv = document.getElementById('stats');
            const tbody = document.querySelector('#resultsTable tbody');
            tbody.innerHTML = '';

            let match = 0, mismatch = 0, notInOracle = 0, notInCsv = 0;

            const oracleMap = {};
            if (oracleRows) oracleRows.forEach(r => oracleMap[r[matchCol]] = r);

            for (const csvLine of dataLines) {
                const vals = csvLine.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                const csvRow = {};
                headers.forEach((h, i) => { if (vals[i] !== undefined) csvRow[h] = vals[i]; });

                const key = csvRow[matchCol];
                const oracleRow = oracleMap[key];
                if (!oracleRow) { notInOracle++; continue; }
                delete oracleMap[key];

                const diffs = [];
                for (const h of headers) {
                    const csvVal = String(csvRow[h] || '').trim();
                    const orcVal = String(oracleRow[h] !== undefined && oracleRow[h] !== null ? oracleRow[h] : '').trim();
                    if (csvVal !== orcVal) diffs.push(`${h}: CSV="${csvVal}" vs Oracle="${orcVal}"`);
                }

                if (diffs.length === 0) { match++; }
                else {
                    mismatch++;
                    const tr = document.createElement('tr');
                    tr.className = 'diff';
                    tr.innerHTML = `<td>${dataLines.indexOf(csvLine)+1}</td><td>${key}</td><td>${key}</td><td>${diffs.join('; ')}</td>`;
                    tbody.appendChild(tr);
                }
            }

            notInCsv = Object.keys(oracleMap).length;

            statsDiv.innerHTML = `
                <div class="stat"><div class="num">${dataLines.length}</div><div class="label">CSV Filas</div></div>
                <div class="stat"><div class="num">${match}</div><div class="label">Coinciden</div></div>
                <div class="stat"><div class="num">${mismatch}</div><div class="label">Diferencias</div></div>
                <div class="stat"><div class="num">${notInOracle}</div><div class="label">Solo en CSV</div></div>
                <div class="stat"><div class="num">${notInCsv}</div><div class="label">Solo en Oracle</div></div>
            `;

            if (mismatch === 0 && notInOracle === 0 && notInCsv === 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = '<td colspan="4" style="text-align:center;color:#16a34a;">✅ Todos los datos coinciden</td>';
                tbody.appendChild(tr);
            }
        }
    </script>
</body>
</html>
